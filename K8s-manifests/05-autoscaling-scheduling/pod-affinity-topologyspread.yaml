# Example Deployment showing anti-affinity + topology spread + taints/tolerations
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-spread
spec:
  replicas: 6
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["web"]
                topologyKey: "kubernetes.io/hostname"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "topology.kubernetes.io/zone"
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: web
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "web-tier"
          effect: "NoSchedule"
      containers:
        - name: app
          image: myrepo/web-app:1.4.2
