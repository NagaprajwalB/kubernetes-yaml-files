# Example showing how a Pod consumes ConfigMap and Secret values
apiVersion: v1
kind: Pod
metadata:
  name: web-app-configured
spec:
  containers:
    - name: app
      image: myrepo/web-app:1.4.2
      envFrom:
        - configMapRef:
            name: web-app-config
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
      volumeMounts:
        - name: config-volume
          mountPath: /etc/app/config
  volumes:
    - name: config-volume
      configMap:
        name: web-app-config
